name: CI

on:
  push:
    branches: [main]
    tags: ["[0-9]+.[0-9]+.[0-9]+"]
  pull_request:

jobs:
  lint:
    name: lint + type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Type check (ty)
        run: uv run ty check

  test:
    name: tests (${{ matrix.os }}, py${{ matrix.python-version }}${{ matrix.experimental && ' [experimental]' || '' }})
    runs-on: ${{ matrix.os }}
    # Don't fail the overall CI for pre-release / unreleased Python versions —
    # we still want early signal when something breaks on upcoming Pythons.
    continue-on-error: ${{ matrix.experimental == true }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13", "3.14"]
        experimental: [false]
        include:
          - os: ubuntu-latest
            python-version: "3.15"
            experimental: true
          - os: macos-latest
            python-version: "3.15"
            experimental: true
          - os: windows-latest
            python-version: "3.15"
            experimental: true
    steps:
      - uses: actions/checkout@v6
        with:
          # setuptools_scm needs the full history to derive the version
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        # Relax lockfile enforcement on experimental Pythons — pre-release
        # wheels may not exist yet, and we don't want to block on resolver drift.
        run: ${{ matrix.experimental && 'uv sync --prerelease=allow' || 'uv sync --locked' }}

      - name: Run tests
        run: uv run pytest

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: codecov/codecov-action@v6
        with:
          files: coverage.xml
          fail_ci_if_error: false

  build:
    name: Build sdist and wheel
    needs: [lint, test]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Build distributions
        run: uv build

      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish-pypi:
    name: Publish to PyPI
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/ocopy
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    name: Create GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Build release notes from git log
        id: notes
        run: |
          tag="${GITHUB_REF_NAME}"
          prev=$(git describe --tags --abbrev=0 "${tag}^" 2>/dev/null || true)
          {
            echo "## What's Changed"
            echo
            if [ -n "$prev" ]; then
              git log --no-merges --reverse --pretty=format:'- %s' "${prev}..${tag}"
              echo
              echo
              echo "**Full Changelog**: https://github.com/${GITHUB_REPOSITORY}/compare/${prev}...${tag}"
            else
              git log --no-merges --reverse --pretty=format:'- %s' "${tag}"
            fi
          } > release_notes.md

      - uses: softprops/action-gh-release@v3
        with:
          files: dist/*
          body_path: release_notes.md
